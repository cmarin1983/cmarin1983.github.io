<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Sorteador | marins.dev</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

  <div class="contenedor">

    <div class="insignia">SORTEO • TRANSPARENTE • ALEATORIO</div>

    <h1>
      <span class="degradado">🎲 Sorteador</span>
    </h1>

    <p class="subtitulo">
      Sorteos transparentes y aleatorios con verificación en vivo
    </p>

    <a class="btn btn-secundario enlace-volver" href="/">
      &larr; Volver al inicio
    </a>

  </div>

</header>

<div class="contenedor">

  <section class="barra-herramientas">

    <div class="configuracion">

      <label>
        Cantidad de números
        <select id="selectNumerosMaximos">
          <option>10</option>
          <option>50</option>
          <option>100</option>
          <option selected>200</option>
        </select>
      </label>

      <label>
        Ganadores
        <select id="selectCantidadGanadores">
          <option selected>1</option>
          <option>2</option>
          <option>3</option>
          <option>5</option>
          <option>10</option>
        </select>
      </label>

      <button id="btnReiniciar" class="btn btn-peligro">
        Reiniciar
      </button>

    </div>

    <div class="estadisticas">
      <span>
        Participantes
        <strong id="contadorParticipantes">0</strong>
      </span>
      <span>
        Números libres
        <strong id="contadorLibres">200</strong>
      </span>
    </div>

  </section>

  <section id="tablero" class="tablero"></section>

  <section id="editor" class="editor oculto">

    <h2>
      Número
      <span id="numeroSeleccionado" class="degradado"></span>
    </h2>

    <input
      id="nombreParticipante"
      maxlength="60"
      placeholder="Nombre del participante">

    <div class="botones-editor">

      <button id="btnGuardar" class="btn btn-primario">
        Guardar
      </button>

      <button id="btnEliminar" class="btn btn-peligro-borde">
        Liberar número
      </button>

      <button id="btnCancelar" class="btn btn-secundario">
        Cancelar
      </button>

    </div>

  </section>

  <section class="seccion-sorteo">

    <button id="btnSortear" class="btn btn-primario btn-grande">
      🎲 Iniciar Sorteo
    </button>

  </section>

  <section id="animacion" class="animacion oculto">

    <div id="numeroGirando" class="numero-girando">000</div>

    <p class="etiqueta-girando">Seleccionando ganador...</p>

  </section>

  <section id="resultados" class="resultados oculto">

    <h2>🏆 Ganadores</h2>

    <div id="listaGanadores"></div>

    <button id="btnLimpiarResultados" class="btn btn-secundario">
      Limpiar resultados
    </button>

  </section>

</div>

<footer>
  <div class="contenedor">
    © 2026 MARÍN • marins.dev
  </div>
</footer>

<script src="script.js"></script>

</body>

</html>
